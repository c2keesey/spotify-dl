<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotify-dl</title>
<style>
  :root {
    --bg: #0c0c0e;
    --panel: #151518;
    --border: rgba(255, 255, 255, 0.07);
    --text: #e8e8ea;
    --dim: #8a8a93;
    --faint: #55555e;
    --accent: #1db954;
    --red: #ff5d5d;
    --amber: #ffb454;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: dark; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 56px 24px 96px; }

  header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 36px; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
  header span { font-size: 12px; color: var(--faint); }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font: 13px/1.7 ui-monospace, "SF Mono", Menlo, monospace;
    padding: 16px 18px 8px;
    min-height: 92px;
  }
  textarea::placeholder { color: var(--faint); }

  .bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px 12px 18px;
  }
  .bar .hint { font-size: 12px; color: var(--faint); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  button {
    background: var(--accent);
    color: #04130a;
    border: none;
    border-radius: 9px;
    font: 600 13px/1 inherit;
    font-family: inherit;
    padding: 9px 18px;
    cursor: pointer;
    transition: filter 0.15s, transform 0.05s;
  }
  button:hover { filter: brightness(1.12); }
  button:active { transform: scale(0.97); }
  button:disabled { background: #2a2a2f; color: var(--faint); cursor: default; }

  section { margin-top: 44px; }
  section > h2 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--faint);
    margin-bottom: 12px;
    padding-left: 2px;
  }
  .empty { color: var(--faint); font-size: 13px; padding: 4px 2px; }

  .job { border-top: 1px solid var(--border); }
  .job:first-child { border-top: none; }
  .job-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 18px;
    cursor: pointer;
    user-select: none;
  }
  .job-row:hover { background: rgba(255, 255, 255, 0.02); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .dot.running { background: var(--amber); animation: pulse 1.2s ease-in-out infinite; }
  .dot.done { background: var(--accent); }
  .dot.failed { background: var(--red); }
  .dot.off { background: var(--faint); }
  @keyframes pulse { 50% { opacity: 0.3; } }
  .job-title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
  }
  .job-last {
    color: var(--dim);
    font-size: 11.5px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    max-width: 45%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .job-log {
    display: none;
    margin: 0 18px 14px;
    padding: 12px 14px;
    background: #0a0a0c;
    border: 1px solid var(--border);
    border-radius: 10px;
    font: 11.5px/1.65 ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--dim);
    max-height: 320px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .job.open .job-log { display: block; }

  .cron {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border-top: 1px solid var(--border);
  }
  .cron:first-child { border-top: none; }
  .cron .sched {
    font: 12px ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--text);
    flex: none;
    width: 110px;
  }
  .cron .cmd {
    flex: 1;
    min-width: 0;
    font-size: 12px;
    color: var(--dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    direction: rtl;
    text-align: left;
  }
  .cron .tag {
    flex: none;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--faint);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 6px;
  }
  .cron.dim { opacity: 0.45; }
  .cron.mine .sched { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header><h1>spotify-dl</h1><span>localhost</span></header>

  <div class="card">
    <textarea id="links" placeholder="Paste Spotify or SoundCloud links, one per line" spellcheck="false"></textarea>
    <div class="bar">
      <div class="hint" id="hint">saves to downloads/</div>
      <button id="go">Download</button>
    </div>
  </div>

  <section>
    <h2>Downloads</h2>
    <div class="card" id="jobs-card" hidden><div id="jobs"></div></div>
    <div class="empty" id="jobs-empty">Nothing yet.</div>
  </section>

  <section>
    <h2>Crons</h2>
    <div class="card" id="crons-card" hidden><div id="crons"></div></div>
    <div class="empty" id="crons-empty">No crontab entries.</div>
  </section>
</div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const open = new Set();   // expanded job ids
const logOffsets = {};    // job id -> lines already rendered

$("go").onclick = async () => {
  const urls = $("links").value.split("\n").map((s) => s.trim()).filter(Boolean);
  if (!urls.length) return;
  $("go").disabled = true;
  try {
    const r = await fetch("/api/download", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ urls }),
    });
    if (r.ok) {
      const { id } = await r.json();
      open.add(id);
      $("links").value = "";
      await refreshJobs();
    }
  } finally {
    $("go").disabled = false;
  }
};
$("links").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) $("go").click();
});

function shortUrl(u) {
  try {
    const p = new URL(u);
    return p.hostname.replace("www.", "").replace("open.", "") + p.pathname;
  } catch { return u; }
}

async function refreshJobs() {
  const list = await (await fetch("/api/jobs")).json();
  $("jobs-card").hidden = !list.length;
  $("jobs-empty").hidden = !!list.length;
  const box = $("jobs");
  const seen = new Set();
  for (const j of list) {
    seen.add("job-" + j.id);
    let el = $("job-" + j.id);
    if (!el) {
      el = document.createElement("div");
      el.className = "job";
      el.id = "job-" + j.id;
      el.innerHTML = `
        <div class="job-row">
          <div class="dot"></div>
          <div class="job-title"></div>
          <div class="job-last"></div>
        </div>
        <div class="job-log"></div>`;
      el.querySelector(".job-row").onclick = () => {
        open.has(j.id) ? open.delete(j.id) : open.add(j.id);
        el.classList.toggle("open", open.has(j.id));
        if (open.has(j.id)) fetchLog(j.id);
      };
      box.prepend(el);
      logOffsets[j.id] = 0;
    }
    el.classList.toggle("open", open.has(j.id));
    el.querySelector(".dot").className = "dot " + j.status;
    el.querySelector(".job-title").textContent = j.urls.map(shortUrl).join(", ");
    el.querySelector(".job-last").textContent = j.status === "running" ? j.last : j.status;
    if (open.has(j.id) && j.status === "running") fetchLog(j.id);
  }
}

async function fetchLog(id) {
  const r = await (await fetch(`/api/jobs/${id}/log?offset=${logOffsets[id] || 0}`)).json();
  if (r.lines.length) {
    const pre = $("job-" + id).querySelector(".job-log");
    const atBottom = pre.scrollTop + pre.clientHeight >= pre.scrollHeight - 24;
    pre.insertAdjacentHTML("beforeend", r.lines.map(esc).join("\n") + "\n");
    logOffsets[id] = r.offset;
    if (atBottom) pre.scrollTop = pre.scrollHeight;
  }
}

async function refreshCrons() {
  const list = await (await fetch("/api/crons")).json();
  $("crons-card").hidden = !list.length;
  $("crons-empty").hidden = !!list.length;
  $("crons").innerHTML = list.map((c) => `
    <div class="cron ${c.enabled ? "" : "dim"} ${c.mine ? "mine" : ""}">
      <div class="dot ${c.enabled ? "done" : "off"}"></div>
      <div class="sched">${esc(c.schedule)}</div>
      <div class="cmd" title="${esc(c.command)}">&lrm;${esc(c.command)}</div>
      ${c.enabled ? "" : '<div class="tag">DISABLED</div>'}
    </div>`).join("");
}

refreshJobs();
refreshCrons();
setInterval(refreshJobs, 1500);
setInterval(refreshCrons, 30000);
</script>
</body>
</html>
