<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotify-dl</title>
<script>
  // Set theme before first paint to avoid a flash.
  (function () {
    var t = localStorage.getItem("theme") ||
      (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.dataset.theme = t;
  })();
</script>
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #151518;
    --panel-2: #0e0e10;
    --border: rgba(255, 255, 255, 0.07);
    --border-hi: rgba(255, 255, 255, 0.14);
    --text: #e9e9ec;
    --dim: #8a8a93;
    --faint: #55555e;
    --accent: #1db954;
    --accent-dim: rgba(29, 185, 84, 0.4);
    --red: #ff5d5d;
    --amber: #ffb454;
    --hover: rgba(255, 255, 255, 0.04);
    --hover-2: rgba(255, 255, 255, 0.06);
    --track: rgba(255, 255, 255, 0.06);
    --disabled-bg: #26262b;
    --slider-off: #3a3a40;
    --shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    --glow: rgba(29, 185, 84, 0.10);
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --panel-2: #f0f1f4;
    --border: rgba(0, 0, 0, 0.09);
    --border-hi: rgba(0, 0, 0, 0.16);
    --text: #1a1a1f;
    --dim: #5c5c66;
    --faint: #9a9aa4;
    --accent-dim: rgba(29, 185, 84, 0.5);
    --red: #d83a3a;
    --amber: #b8770f;
    --hover: rgba(0, 0, 0, 0.04);
    --hover-2: rgba(0, 0, 0, 0.06);
    --track: rgba(0, 0, 0, 0.08);
    --disabled-bg: #e3e3e8;
    --slider-off: #c4c4cc;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.10);
    --glow: rgba(29, 185, 84, 0.07);
    color-scheme: light;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image: radial-gradient(900px 420px at 50% -160px, var(--glow), transparent 70%);
    background-repeat: no-repeat;
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap { max-width: 660px; margin: 0 auto; padding: 52px 24px 120px; }

  header { display: flex; align-items: center; gap: 11px; margin-bottom: 30px; }
  .logo {
    width: 26px; height: 26px; border-radius: 7px; flex: none;
    background: linear-gradient(150deg, #1ed760, #169c46);
    display: grid; place-items: center;
    box-shadow: 0 2px 12px rgba(29, 185, 84, 0.35);
  }
  .logo svg { width: 15px; height: 15px; }
  header h1 { font-size: 16px; font-weight: 650; letter-spacing: -0.02em; }
  header .tag { font-size: 11.5px; color: var(--faint); margin-left: auto; display: flex; align-items: center; gap: 6px; }
  header .tag::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 7px var(--accent); }
  .theme-btn {
    flex: none; margin-left: 12px; width: 30px; height: 30px; border-radius: 8px;
    background: transparent; border: 1px solid var(--border); color: var(--dim);
    display: grid; place-items: center; font-size: 15px; line-height: 1; padding: 0; cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .theme-btn:hover { color: var(--text); background: var(--hover); filter: none; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset, var(--shadow);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font: 13px/1.7 ui-monospace, "SF Mono", Menlo, monospace;
    padding: 17px 18px 10px;
    min-height: 88px;
  }
  textarea::placeholder { color: var(--faint); }

  /* live preview list */
  .previews { padding: 0 12px 6px; display: flex; flex-direction: column; gap: 4px; }
  .pv {
    display: flex; align-items: center; gap: 11px;
    padding: 7px 8px; border-radius: 10px;
    animation: pop 0.18s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(-3px); } }
  .pv-art {
    width: 38px; height: 38px; border-radius: 7px; flex: none;
    background: var(--panel-2) center/cover no-repeat;
    border: 1px solid var(--border);
    display: grid; place-items: center; color: var(--faint); font-size: 15px;
  }
  .pv-art.err { border-color: rgba(255,93,93,0.3); color: var(--red); }
  .pv-main { flex: 1; min-width: 0; }
  .pv-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pv-name.err { color: var(--amber); }
  .pv-meta { font-size: 11.5px; color: var(--dim); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pv-meta.err { color: var(--faint); }
  .pv-kind {
    flex: none; font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--dim); background: var(--panel-2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 20px;
  }
  .pv-spin { flex: none; width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--border); border-top-color: var(--dim); animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .bar {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 11px 12px 12px 16px;
    border-top: 1px solid var(--border);
  }
  .where {
    flex: 1; min-width: 0;
    display: flex; align-items: center; gap: 7px;
    color: var(--faint); font-size: 12px;
  }
  .where svg { width: 13px; height: 13px; flex: none; }
  .where input {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    color: var(--dim);
    font: 12px ui-monospace, "SF Mono", Menlo, monospace;
    padding: 4px 0;
  }
  .where input::placeholder { color: var(--faint); }
  .where input:focus { color: var(--text); }

  button {
    background: var(--accent); color: #04130a; border: none; border-radius: 9px;
    font: 600 13px/1 -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 9px 17px; cursor: pointer;
    transition: filter 0.15s, transform 0.05s, opacity 0.15s; white-space: nowrap;
  }
  button:hover { filter: brightness(1.12); }
  button:active { transform: scale(0.97); }
  button:disabled { background: var(--disabled-bg); color: var(--faint); cursor: default; filter: none; }
  button.ghost {
    background: transparent; color: var(--dim);
    border: 1px solid var(--border); font-weight: 500; padding: 8px 12px;
  }
  button.ghost:hover { color: var(--text); background: var(--hover); filter: none; }
  button.ghost.on { color: var(--accent); border-color: var(--accent-dim); }
  .go { display: flex; align-items: center; gap: 7px; }
  .go svg { width: 14px; height: 14px; }

  select, input[type=time], input[type=number] {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 9px; font: 13px -apple-system, BlinkMacSystemFont, sans-serif; outline: none;
  }
  select:focus, input[type=time]:focus, input[type=number]:focus { border-color: var(--accent-dim); }
  input[type=number] { width: 56px; }

  .sched-panel { border-top: 1px solid var(--border); padding: 14px 18px 16px; }
  .sched-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .sched-row .spacer { flex: 1; }
  .sched-row .lbl { color: var(--dim); font-size: 13px; }
  .sched-hint { color: var(--faint); font-size: 12px; margin-top: 11px; }
  .sched-hint.bad { color: var(--amber); }
  #cancel-edit { color: var(--accent); cursor: pointer; margin-left: 4px; }
  #cancel-edit:hover { text-decoration: underline; }
  .cron.editing { background: rgba(29, 185, 84, 0.05); }

  section { margin-top: 40px; }
  section > h2 {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em;
    color: var(--faint); margin-bottom: 12px; padding-left: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  section > h2 .h-act { margin-left: auto; text-transform: none; letter-spacing: 0; font-weight: 500; color: var(--faint); cursor: pointer; }
  section > h2 .h-act:hover { color: var(--dim); }
  .empty { color: var(--faint); font-size: 13px; padding: 4px 2px; }

  /* jobs */
  .job { border-top: 1px solid var(--border); }
  .job:first-child { border-top: none; }
  .job-row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; user-select: none; }
  .job.clickable .job-row { cursor: pointer; }
  .job.clickable .job-row:hover { background: var(--hover); }
  .job-art {
    position: relative; width: 40px; height: 40px; border-radius: 8px; flex: none;
    background: var(--panel-2) center/cover no-repeat; border: 1px solid var(--border);
    display: grid; place-items: center; color: var(--faint); font-size: 16px;
  }
  .sdot { position: absolute; right: -3px; bottom: -3px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--panel); }
  .sdot.running { background: var(--amber); animation: pulse 1.2s ease-in-out infinite; }
  .sdot.done { background: var(--accent); }
  .sdot.failed { background: var(--red); }
  @keyframes pulse { 50% { opacity: 0.3; } }
  .job-main { flex: 1; min-width: 0; }
  .job-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
  .job-sub { color: var(--dim); font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; min-height: 16px; }
  .job-sub.err { color: var(--red); white-space: normal; }
  .job-sub .more { color: var(--amber); }
  .job-count { flex: none; font: 12px ui-monospace, "SF Mono", Menlo, monospace; color: var(--dim); font-variant-numeric: tabular-nums; }
  .job-count.done { color: var(--accent); }
  .job-count.failed { color: var(--red); }
  .job-retry { flex: none; background: transparent; border: 1px solid var(--border); color: var(--dim); font-size: 12px; font-weight: 500; padding: 5px 11px; border-radius: 7px; }
  .job-retry:hover { color: var(--text); background: var(--hover); filter: none; }
  .job-retry[hidden] { display: none; }
  .job-bar { height: 3px; margin: -1px 18px 12px 70px; background: var(--track); border-radius: 2px; overflow: hidden; }
  .job-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.7s ease; }
  .job-fill.indet { width: 30%; animation: slide 1.3s ease-in-out infinite; }
  @keyframes slide { from { transform: translateX(-110%); } to { transform: translateX(370%); } }
  .job-fails { display: none; margin: -2px 18px 14px 70px; }
  .job.open .job-fails { display: block; }
  .job-fails .ft { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; color: var(--dim); border-top: 1px solid var(--border); }
  .job-fails .ft:first-child { border-top: none; }
  .job-fails .ft::before { content: "×"; color: var(--red); font-weight: 600; flex: none; }
  .job-fails .ft.unmatched { color: var(--faint); }
  .job-fails .ft.unmatched::before { content: "?"; color: var(--amber); }
  .job-fails .ft-tag { margin-left: auto; flex: none; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--amber); background: color-mix(in srgb, var(--amber) 16%, transparent); border-radius: 20px; padding: 2px 8px; }
  .job-fails .ft-note { font-size: 11.5px; color: var(--faint); padding-top: 6px; }

  /* library */
  .lib { display: flex; align-items: center; gap: 12px; padding: 11px 18px; border-top: 1px solid var(--border); }
  .lib:first-child { border-top: none; }
  .lib-ico { width: 30px; height: 30px; border-radius: 8px; flex: none; background: var(--panel-2); border: 1px solid var(--border); display: grid; place-items: center; color: var(--faint); }
  .lib-ico svg { width: 15px; height: 15px; }
  .lib-main { flex: 1; min-width: 0; }
  .lib-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lib-sub { font-size: 11.5px; color: var(--dim); margin-top: 1px; }
  .lib-reveal { flex: none; background: transparent; border: none; color: var(--faint); font-size: 12px; padding: 5px 9px; border-radius: 7px; }
  .lib-reveal:hover { color: var(--text); background: var(--hover); filter: none; }
  .lib-sync { flex: none; background: transparent; border: 1px solid var(--border); color: var(--dim); font-size: 12px; font-weight: 500; padding: 5px 11px; border-radius: 7px; }
  .lib-sync:hover { color: var(--accent); border-color: var(--accent-dim); background: transparent; filter: none; }

  /* crons */
  .cron { display: flex; align-items: center; gap: 13px; padding: 12px 18px; border-top: 1px solid var(--border); }
  .cron:first-child { border-top: none; }
  .cron.dim .cron-main { opacity: 0.5; }
  .cron-main { flex: 1; min-width: 0; }
  .cron-title { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cron-sub { font-size: 11.5px; color: var(--dim); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cron-del { flex: none; background: transparent; border: none; color: var(--faint); font-size: 12px; padding: 5px 8px; border-radius: 7px; }
  .cron-del:hover { color: var(--red); background: rgba(255, 93, 93, 0.08); filter: none; }
  .cron-del.armed { color: var(--red); font-weight: 600; }
  .cron-edit { flex: none; background: transparent; border: none; color: var(--faint); font-size: 12px; padding: 5px 8px; border-radius: 7px; }
  .cron-edit:hover { color: var(--text); background: var(--hover); filter: none; }
  .cron-edit.on { color: var(--accent); }
  .switch { position: relative; width: 34px; height: 20px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; cursor: pointer; background: var(--slider-off); border-radius: 20px; transition: background 0.2s; }
  .slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 2px; top: 2px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(14px); }

  /* folder picker modal */
  .modal { position: fixed; inset: 0; z-index: 50; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal[hidden] { display: none; }
  .modal-card { background: var(--panel); border: 1px solid var(--border-hi); border-radius: 16px; width: 100%; max-width: 470px; display: flex; flex-direction: column; max-height: 74vh; box-shadow: 0 24px 70px rgba(0, 0, 0, 0.6); }
  .picker-head { display: flex; align-items: center; gap: 9px; padding: 13px 14px; border-bottom: 1px solid var(--border); }
  .picker-up { flex: none; background: transparent; border: 1px solid var(--border); color: var(--dim); padding: 6px 11px; border-radius: 8px; font-size: 14px; }
  .picker-up:hover { color: var(--text); filter: none; background: var(--hover); }
  .picker-up:disabled { opacity: 0.35; }
  .picker-filter { flex: 1; min-width: 0; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font: 13px -apple-system, sans-serif; padding: 7px 11px; outline: none; }
  .picker-filter:focus { border-color: var(--accent-dim); }
  .picker-path { padding: 8px 16px; font: 11.5px ui-monospace, "SF Mono", Menlo, monospace; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: rtl; text-align: left; border-bottom: 1px solid var(--border); }
  .picker-places { display: flex; gap: 7px; padding: 11px 16px; flex-wrap: wrap; border-bottom: 1px solid var(--border); align-items: center; }
  .picker-places .grp-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); width: 100%; margin-bottom: -3px; }
  .chip { background: var(--panel-2); border: 1px solid var(--border); color: var(--dim); font-size: 12px; padding: 5px 11px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; max-width: 180px; }
  .chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip:hover { color: var(--text); border-color: var(--border-hi); filter: none; }
  .picker-list { flex: 1; overflow-y: auto; padding: 6px; min-height: 120px; }
  .picker-list .row { display: flex; align-items: center; gap: 9px; padding: 9px 11px; border-radius: 9px; cursor: pointer; font-size: 13px; }
  .picker-list .row:hover, .picker-list .row.hi { background: var(--hover-2); }
  .picker-list .ico { color: var(--faint); }
  .picker-list .none { color: var(--faint); font-size: 12px; padding: 14px 11px; }
  .picker-foot { display: flex; justify-content: space-between; gap: 10px; padding: 13px 16px; border-top: 1px solid var(--border); }

  /* tabs */
  .tabs { display: flex; gap: 6px; margin-bottom: 22px; }
  .tab { background: transparent; border: 1px solid var(--border); color: var(--dim);
         font-weight: 500; padding: 7px 15px; border-radius: 20px; }
  .tab:hover { color: var(--text); background: var(--hover); filter: none; }
  .tab.on { color: var(--accent); border-color: var(--accent-dim); }
  body.dj-mode .wrap { max-width: 980px; }

  /* dj banner */
  .dj-banner { padding: 12px 18px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
  .dj-banner .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .dj-banner .dot.open { background: var(--amber); }
  .dj-banner .dot.closed { background: var(--accent); }
  .dj-banner .hint { color: var(--dim); }
  .dj-banner .spacer { flex: 1; }

  /* filters + table */
  .dj-filters { display: flex; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .dj-filters input, .dj-filters select { background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; font: 13px -apple-system, sans-serif; outline: none; }
  .dj-filters input:focus { border-color: var(--accent-dim); }
  #dj-q { flex: 1; }
  #dj-bpm-min, #dj-bpm-max { width: 74px; }
  .dj-table-wrap { max-height: 380px; overflow-y: auto; }
  .dj-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .dj-table th { text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--faint); padding: 8px 10px; position: sticky; top: 0; background: var(--panel); }
  .dj-table td { padding: 7px 10px; border-top: 1px solid var(--border); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
  .dj-table tr:hover td { background: var(--hover); }
  .dj-table .num { font-variant-numeric: tabular-nums; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .dj-key { display: inline-block; min-width: 30px; text-align: center; font-size: 11px; font-weight: 600;
    border-radius: 20px; padding: 2px 7px; }
  .dj-pending { color: var(--faint); font-size: 11px; }
  .dj-add { background: transparent; border: 1px solid var(--border); color: var(--dim);
    font-size: 12px; padding: 3px 10px; border-radius: 7px; }
  .dj-add:hover { color: var(--accent); border-color: var(--accent-dim); background: transparent; filter: none; }
  .dj-add:disabled { opacity: 0.35; }
  /* set builder */
  .dj-set-summary { padding: 10px 18px; font-size: 12px; color: var(--dim); border-bottom: 1px solid var(--border); }
  .dj-set-summary:empty { display: none; }
  #dj-set-list { min-height: 40px; }
  .dj-slot { display: flex; align-items: center; gap: 10px; padding: 9px 18px; cursor: grab; }
  .dj-slot.dragging { opacity: 0.4; }
  .dj-slot .n { color: var(--faint); font-size: 11px; width: 18px; text-align: right; }
  .dj-slot .t { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
  .dj-slot .t small { color: var(--dim); }
  .dj-slot .num { font: 12px ui-monospace, "SF Mono", Menlo, monospace; color: var(--dim); }
  .dj-slot .rm { background: transparent; border: none; color: var(--faint); font-size: 13px; padding: 2px 7px; }
  .dj-slot .rm:hover { color: var(--red); filter: none; }
  .dj-link { display: flex; align-items: center; gap: 8px; padding: 0 18px 0 46px; height: 14px; }
  .dj-link .line { flex: none; width: 46px; height: 3px; border-radius: 2px; }
  .dj-link.good .line { background: var(--accent); }
  .dj-link.ok .line { background: var(--amber); }
  .dj-link.clash .line { background: var(--red); }
  .dj-link .why { font-size: 10.5px; color: var(--faint); }
  .dj-empty-set { color: var(--faint); font-size: 13px; padding: 16px 18px; }
  .dj-name-input { flex: 1; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 11px; font: 13px -apple-system, sans-serif; outline: none; }
  .dj-name-input:focus { border-color: var(--accent-dim); }
  .dj-viz { display: flex; gap: 16px; margin-top: 16px; }
  .dj-viz-card { flex: 1; padding: 14px; min-height: 100px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z" fill="#04130a"/></svg></div>
    <h1>spotify-dl</h1>
    <span class="tag">localhost</span>
    <button class="theme-btn" id="theme" title="Toggle light / dark" aria-label="Toggle theme"></button>
  </header>

  <nav class="tabs">
    <button class="tab on" data-tab="dl">Download</button>
    <button class="tab" data-tab="dj">DJ Sets</button>
  </nav>

  <div id="tab-dl">
  <div class="card">
    <textarea id="links" placeholder="Paste Spotify or SoundCloud links, one per line" spellcheck="false"></textarea>
    <div class="previews" id="previews"></div>
    <div class="bar">
      <label class="where" title="Output folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
        <input id="outdir" spellcheck="false" autocomplete="off">
      </label>
      <button class="ghost" id="browse">Browse</button>
      <button class="ghost" id="sched-toggle">Schedule</button>
      <button class="go" id="go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 4v12m0 0 4-4m-4 4-4-4M4 20h16"/></svg><span id="go-label">Download</span></button>
    </div>
    <div class="sched-panel" id="sched-panel" hidden>
      <div class="sched-row">
        <select id="freq">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="hourly">Every few hours</option>
        </select>
        <select id="dow" hidden></select>
        <span class="lbl" id="at-lbl">at</span>
        <input type="time" id="time" value="03:00">
        <span class="lbl" id="every-wrap" hidden>every <input type="number" id="every" value="6" min="1" max="23"> hrs</span>
        <span class="spacer"></span>
        <button id="add-sched">Add schedule</button>
      </div>
      <div class="sched-hint" id="sched-hint">Re-downloads the links above on a repeating schedule.</div>
    </div>
  </div>

  <section>
    <h2>Downloads</h2>
    <div class="card" id="jobs-card" hidden><div id="jobs"></div></div>
    <div class="empty" id="jobs-empty">Nothing yet.</div>
  </section>

  <section>
    <h2>Library <span class="h-act" id="lib-refresh">Refresh</span></h2>
    <div class="card" id="lib-card" hidden><div id="lib"></div></div>
    <div class="empty" id="lib-empty">No downloads in this folder yet.</div>
  </section>

  <section>
    <h2>Scheduled</h2>
    <div class="card" id="crons-card" hidden><div id="crons"></div></div>
    <div class="empty" id="crons-empty">No schedules yet.</div>
  </section>
  </div><!-- #tab-dl -->

  <div id="tab-dj" hidden>
    <div class="dj-banner card" id="dj-banner"></div>

    <section>
      <h2>Tracks <span class="h-act" id="dj-refresh">Refresh</span></h2>
      <div class="card">
        <div class="dj-filters">
          <input id="dj-q" placeholder="Search title or artist…" spellcheck="false">
          <input id="dj-bpm-min" type="number" placeholder="BPM ≥" min="0">
          <input id="dj-bpm-max" type="number" placeholder="BPM ≤" min="0">
          <select id="dj-camelot"><option value="">Any key</option></select>
        </div>
        <div class="dj-table-wrap"><table class="dj-table">
          <thead><tr><th></th><th>Title</th><th>Artist</th><th>BPM</th><th>Key</th><th></th></tr></thead>
          <tbody id="dj-rows"></tbody>
        </table></div>
      </div>
    </section>

    <section id="dj-set-section">
      <h2>Set</h2>
      <div class="card" id="dj-set-card">
        <div id="dj-set-summary" class="dj-set-summary"></div>
        <div id="dj-set-list"></div>
        <div class="bar">
          <input id="dj-set-name" placeholder="Set name…" spellcheck="false" class="dj-name-input">
          <button id="dj-save">Save to rekordbox</button>
        </div>
      </div>
      <div class="dj-viz">
        <div class="card dj-viz-card"><div id="dj-wheel"></div></div>
        <div class="card dj-viz-card"><div id="dj-energy"></div></div>
      </div>
    </section>
  </div>
</div>

<div class="modal" id="picker" hidden>
  <div class="modal-card">
    <div class="picker-head">
      <button class="picker-up" id="pick-up" title="Up one level">↑</button>
      <input class="picker-filter" id="pick-filter" placeholder="Filter folders…" spellcheck="false" autocomplete="off">
    </div>
    <div class="picker-path" id="pick-path"></div>
    <div class="picker-places" id="pick-places"></div>
    <div class="picker-list" id="pick-list"></div>
    <div class="picker-foot">
      <button class="ghost" id="pick-cancel">Cancel</button>
      <button id="pick-use">Use this folder</button>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const open = new Set();          // expanded job ids (to show failed tracks)
let DEFAULT_OUT = "";
let PLACES = [];

const DAYS = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
$("dow").innerHTML = DAYS.map((d, i) => `<option value="${i}"${i === 5 ? " selected" : ""}>${d}</option>`).join("");

function linksFromBox() {
  return $("links").value.split("\n").map((s) => s.trim()).filter(Boolean);
}
function shortUrl(u) {
  try {
    const p = new URL(u);
    return p.hostname.replace("www.", "").replace("open.", "") + p.pathname;
  } catch { return u; }
}

/* ---- live link preview ---- */
const previewCache = {};   // url -> {kind,name,image,count,error} | "loading"
let previewTimer = null;

function validUrls() {
  return linksFromBox().filter((u) => {
    const p = previewCache[u];
    return p && p !== "loading" && !p.error && p.kind;
  });
}

function renderGoButton() {
  const urls = linksFromBox();
  const valid = validUrls();
  const loading = urls.some((u) => previewCache[u] === "loading");
  $("go").disabled = valid.length === 0;
  let label = "Download";
  if (valid.length) {
    const tracks = valid.reduce((n, u) => n + (previewCache[u].count || 0), 0);
    label = tracks ? `Download ${tracks} track${tracks === 1 ? "" : "s"}` : `Download ${valid.length}`;
  } else if (loading) {
    label = "Checking links…";
  }
  $("go-label").textContent = label;
}

function renderPreviews() {
  const urls = linksFromBox();
  const box = $("previews");
  if (!urls.length) { box.innerHTML = ""; renderGoButton(); return; }
  box.innerHTML = urls.map((u) => {
    const p = previewCache[u];
    if (!p || p === "loading") {
      return `<div class="pv"><div class="pv-art"></div><div class="pv-main"><div class="pv-name">${esc(shortUrl(u))}</div><div class="pv-meta">Loading…</div></div><div class="pv-spin"></div></div>`;
    }
    if (p.error) {
      return `<div class="pv"><div class="pv-art err">!</div><div class="pv-main"><div class="pv-name err">${esc(p.name || shortUrl(u))}</div><div class="pv-meta err">${esc(p.error)}</div></div></div>`;
    }
    const art = p.image
      ? `<div class="pv-art" style="background-image:url('${esc(p.image)}')"></div>`
      : `<div class="pv-art">${p.kind === "soundcloud" ? "☁" : "♪"}</div>`;
    const meta = p.count ? `${p.count} track${p.count === 1 ? "" : "s"}` : (p.kind === "soundcloud" ? "SoundCloud" : "");
    return `<div class="pv">${art}<div class="pv-main"><div class="pv-name">${esc(p.name || shortUrl(u))}</div><div class="pv-meta">${esc(meta)}</div></div><div class="pv-kind">${esc(p.kind)}</div></div>`;
  }).join("");
  renderGoButton();
}

async function fetchPreview(url) {
  previewCache[url] = "loading";
  try {
    const r = await fetch("/api/preview?url=" + encodeURIComponent(url));
    previewCache[url] = r.ok ? await r.json() : { error: "Couldn't check this link." };
  } catch {
    previewCache[url] = { error: "Couldn't check this link." };
  }
  renderPreviews();
}

function schedulePreviews() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    const urls = linksFromBox();
    for (const u of urls) if (!(u in previewCache)) fetchPreview(u);
    renderPreviews();
  }, 350);
}
$("links").addEventListener("input", () => { renderPreviews(); schedulePreviews(); });

/* ---- download ---- */
$("go").onclick = async () => {
  const urls = validUrls();
  if (!urls.length) return;
  $("go").disabled = true;
  const output = $("outdir").value.trim();
  localStorage.setItem("outdir", output);
  try {
    const r = await fetch("/api/download", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ urls, output }),
    });
    if (r.ok) {
      const { id } = await r.json();
      open.add(id);
      $("links").value = "";
      renderPreviews();
      await refreshJobs();
    }
  } finally {
    renderGoButton();
  }
};
$("links").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) $("go").click();
});

/* ---- scheduler ---- */
$("sched-toggle").onclick = () => {
  const panel = $("sched-panel");
  panel.hidden = !panel.hidden;
  $("sched-toggle").classList.toggle("on", !panel.hidden);
};
$("freq").onchange = () => {
  const f = $("freq").value;
  $("dow").hidden = f !== "weekly";
  $("time").hidden = f === "hourly";
  $("at-lbl").hidden = f === "hourly";
  $("every-wrap").hidden = f !== "hourly";
};
$("add-sched").onclick = async () => {
  const urls = validUrls();
  const hint = $("sched-hint");
  if (!urls.length) {
    hint.textContent = "Add at least one valid link above first.";
    hint.classList.add("bad");
    return;
  }
  const [hour, minute] = ($("time").value || "03:00").split(":").map(Number);
  const body = {
    urls, output: $("outdir").value.trim(), freq: $("freq").value,
    hour, minute, dow: Number($("dow").value), every: Number($("every").value),
  };
  $("add-sched").disabled = true;
  const editing = editingCronId;
  try {
    const r = await fetch(editing ? `/api/crons/${editing}` : "/api/crons", {
      method: editing ? "PUT" : "POST",
      headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    });
    if (r.ok) {
      resetEditMode();
      $("sched-panel").hidden = true;
      $("sched-toggle").classList.remove("on");
      await refreshCrons();
    } else {
      hint.textContent = editing ? "Couldn't save changes." : "Couldn't create schedule.";
      hint.classList.add("bad");
    }
  } finally {
    $("add-sched").disabled = false;
  }
};

/* ---- folder picker ---- */
let pickPath = "";
let pickDirs = [];
let pickHi = -1;

function recents() {
  try { return JSON.parse(localStorage.getItem("recentDirs") || "[]"); } catch { return []; }
}
function pushRecent(path) {
  const list = [path, ...recents().filter((p) => p !== path)].slice(0, 5);
  localStorage.setItem("recentDirs", JSON.stringify(list));
}

function renderPlaces() {
  const rec = recents();
  let html = PLACES.map((p) => `<button class="chip" data-path="${esc(p.path)}"><span>${esc(p.label)}</span></button>`).join("");
  if (rec.length) {
    html += `<div class="grp-lbl">Recent</div>` + rec.map((p) =>
      `<button class="chip" data-path="${esc(p)}"><span>${esc(p.split("/").pop() || p)}</span></button>`).join("");
  }
  $("pick-places").innerHTML = html;
}
async function openPicker() {
  renderPlaces();
  $("pick-filter").value = "";
  await browseTo($("outdir").value.trim() || DEFAULT_OUT);
  $("picker").hidden = false;
  $("pick-filter").focus();
}
function renderPickList() {
  const f = $("pick-filter").value.trim().toLowerCase();
  const shown = pickDirs.filter((d) => d.toLowerCase().includes(f));
  if (pickHi >= shown.length) pickHi = shown.length - 1;
  $("pick-list").innerHTML = shown.length
    ? shown.map((d, i) => `<div class="row${i === pickHi ? " hi" : ""}" data-name="${esc(d)}"><span class="ico">▸</span>${esc(d)}</div>`).join("")
    : `<div class="none">No subfolders${f ? " match" : " here"}.</div>`;
}
async function browseTo(path) {
  const r = await (await fetch("/api/browse?path=" + encodeURIComponent(path))).json();
  pickPath = r.path;
  pickDirs = r.dirs;
  pickHi = -1;
  $("pick-path").textContent = r.path;
  $("pick-up").disabled = !r.parent;
  $("pick-up").dataset.path = r.parent || "";
  $("pick-filter").value = "";
  renderPickList();
}
function enterFolder(name) {
  browseTo(pickPath.replace(/\/$/, "") + "/" + name);
}
async function pickFolderNative() {
  const btn = $("browse");
  btn.disabled = true;
  try {
    const r = await fetch("/api/pick-folder", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ start: $("outdir").value.trim() || DEFAULT_OUT }),
    });
    if (r.status === 501) { openPicker(); return; }   // non-macOS: in-browser fallback
    const d = await r.json();
    if (d.cancelled) return;
    if (d.path) {
      $("outdir").value = d.path;
      localStorage.setItem("outdir", d.path);
      pushRecent(d.path);
      refreshLibrary();
    }
  } catch {
    openPicker();   // server/dialog failed: fall back to the in-browser picker
  } finally {
    btn.disabled = false;
  }
}
$("browse").onclick = pickFolderNative;
$("pick-cancel").onclick = () => { $("picker").hidden = true; };
$("picker").onclick = (e) => { if (e.target === $("picker")) $("picker").hidden = true; };
$("pick-use").onclick = () => {
  $("outdir").value = pickPath;
  localStorage.setItem("outdir", pickPath);
  pushRecent(pickPath);
  $("picker").hidden = true;
  refreshLibrary();
};
$("pick-up").onclick = (e) => { if (e.currentTarget.dataset.path) browseTo(e.currentTarget.dataset.path); };
$("pick-places").onclick = (e) => {
  const chip = e.target.closest(".chip");
  if (chip) browseTo(chip.dataset.path);
};
$("pick-list").onclick = (e) => {
  const row = e.target.closest(".row");
  if (row) enterFolder(row.dataset.name);
};
$("pick-filter").addEventListener("input", () => { pickHi = -1; renderPickList(); });
$("pick-filter").addEventListener("keydown", (e) => {
  const shown = pickDirs.filter((d) => d.toLowerCase().includes($("pick-filter").value.trim().toLowerCase()));
  if (e.key === "ArrowDown") { e.preventDefault(); pickHi = Math.min(shown.length - 1, pickHi + 1); renderPickList(); }
  else if (e.key === "ArrowUp") { e.preventDefault(); pickHi = Math.max(0, pickHi - 1); renderPickList(); }
  else if (e.key === "Enter") { e.preventDefault(); const t = shown[pickHi] || shown[0]; if (t) enterFolder(t); }
  else if (e.key === "Escape") { $("picker").hidden = true; }
});

/* ---- jobs ---- */
function jobLabel(j) {
  // prefer server-resolved meta, then the live preview cache, then the URL
  const names = j.urls.map((u) => {
    const m = (j.meta || []).find((x) => x && x.url === u) || previewCache[u];
    return (m && m !== "loading" && m.name) || shortUrl(u);
  });
  const metas = (j.meta && j.meta.length ? j.meta : j.urls.map((u) => previewCache[u]))
    .filter((m) => m && m !== "loading");
  const image = (metas.find((m) => m.image) || {}).image || null;
  return { title: names.join(", "), image };
}

async function refreshJobs() {
  const list = await (await fetch("/api/jobs")).json();
  $("jobs-card").hidden = !list.length;
  $("jobs-empty").hidden = !!list.length;
  const box = $("jobs");
  let anyDone = false;
  for (const j of list) {
    if (j.status !== "running" && !$("job-" + j.id)?.dataset.settled) anyDone = true;
    let el = $("job-" + j.id);
    if (!el) {
      el = document.createElement("div");
      el.className = "job";
      el.id = "job-" + j.id;
      el.innerHTML = `
        <div class="job-row">
          <div class="job-art"><span class="art-ico"></span><div class="sdot"></div></div>
          <div class="job-main"><div class="job-title"></div><div class="job-sub"></div></div>
          <div class="job-count"></div>
          <button class="job-retry" hidden>Retry</button>
        </div>
        <div class="job-bar" hidden><div class="job-fill"></div></div>
        <div class="job-fails"></div>`;
      el.querySelector(".job-row").onclick = () => {
        if (!el.classList.contains("clickable")) return;
        open.has(j.id) ? open.delete(j.id) : open.add(j.id);
        el.classList.toggle("open", open.has(j.id));
      };
      el.querySelector(".job-retry").onclick = async (ev) => {
        ev.stopPropagation();
        const btn = ev.currentTarget;
        btn.disabled = true; btn.textContent = "Retrying…";
        try {
          const r = await fetch(`/api/jobs/${j.id}/retry`, { method: "POST" });
          if (r.ok) { const { id } = await r.json(); open.add(id); await refreshJobs(); }
        } finally {
          btn.disabled = false; btn.textContent = "Retry";
        }
      };
      box.prepend(el);
    }
    const { title, image } = jobLabel(j);
    const art = el.querySelector(".job-art");
    if (image) { art.style.backgroundImage = `url('${image}')`; art.querySelector(".art-ico").textContent = ""; }
    else { art.style.backgroundImage = ""; art.querySelector(".art-ico").textContent = "♪"; }
    el.querySelector(".sdot").className = "sdot " + j.status;
    el.querySelector(".job-title").textContent = title;
    renderStatus(el, j);
    el.classList.toggle("open", open.has(j.id));
    if (j.status !== "running") el.dataset.settled = "1";
  }
  if (anyDone) refreshLibrary();
}

function renderStatus(el, j) {
  const p = j.progress;
  const sub = el.querySelector(".job-sub");
  const count = el.querySelector(".job-count");
  const bar = el.querySelector(".job-bar");
  const fill = el.querySelector(".job-fill");
  const fails = el.querySelector(".job-fails");
  const retry = el.querySelector(".job-retry");
  sub.classList.remove("err");
  el.classList.remove("clickable");
  fails.innerHTML = "";
  retry.hidden = true;

  if (j.status === "running") {
    bar.hidden = false;
    if (!p.total) {
      sub.textContent = "Fetching tracks…";
      count.textContent = "";
      fill.classList.add("indet");
    } else {
      sub.textContent = p.current || "Starting downloads…";
      count.textContent = `${p.done} / ${p.total}`;
      fill.classList.remove("indet");
      fill.style.width = Math.min(100, ((p.done + p.pct / 100) / p.total) * 100) + "%";
    }
    count.className = "job-count";
    return;
  }

  bar.hidden = true;
  count.textContent = j.status === "failed" ? "Failed" : "Done";
  count.className = "job-count " + j.status;
  retry.hidden = !(j.status === "failed" || (j.progress.failed || 0) > 0);

  if (j.status === "failed" && j.error && !p.total) {
    sub.textContent = j.error;
    sub.classList.add("err");
    return;
  }

  const missing = p.failed || 0;
  let line = p.total ? `${p.done} of ${p.total} track${p.total === 1 ? "" : "s"}` : "Done";
  if (missing > 0) {
    const named = p.failed_tracks || [];
    const unmatched = p.unmatched || [];
    let tail = `${missing} didn't make it`;
    if (unmatched.length) tail += ` · ${unmatched.length} unmatched`;
    line += ` · <span class="more">${tail}</span>`;
    el.classList.add("clickable");
    fails.innerHTML =
      named.map((n) => `<div class="ft">${esc(n)}</div>`).join("") +
      unmatched.map((n) => `<div class="ft unmatched">${esc(n)}<span class="ft-tag">no YouTube match</span></div>`).join("");
    const known = named.length + unmatched.length;
    if (missing > known) {
      fails.innerHTML += `<div class="ft-note">${known ? "+" : ""}${missing - known} more didn't make it.</div>`;
    }
  }
  sub.innerHTML = line;
}

/* ---- library ---- */
async function refreshLibrary() {
  const out = $("outdir").value.trim();
  const r = await (await fetch("/api/library?path=" + encodeURIComponent(out))).json();
  const items = r.folders.filter((f) => f.tracks > 0);
  const total = items.length + (r.loose ? 1 : 0);
  $("lib-card").hidden = !total;
  $("lib-empty").hidden = !!total;
  const folderSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>`;
  let rows = items.map((f) => `
    <div class="lib">
      <div class="lib-ico">${folderSvg}</div>
      <div class="lib-main"><div class="lib-name">${esc(f.name)}</div><div class="lib-sub">${f.tracks} track${f.tracks === 1 ? "" : "s"}</div></div>
      ${f.url ? `<button class="lib-sync" data-url="${esc(f.url)}" title="Download newly added tracks from the source">Sync</button>` : ""}
      <button class="lib-reveal" data-path="${esc(f.path)}">Reveal</button>
    </div>`).join("");
  if (r.loose) {
    rows += `<div class="lib"><div class="lib-ico">${folderSvg}</div><div class="lib-main"><div class="lib-name">This folder</div><div class="lib-sub">${r.loose} loose track${r.loose === 1 ? "" : "s"}</div></div><button class="lib-reveal" data-path="${esc(r.path)}">Reveal</button></div>`;
  }
  $("lib").innerHTML = rows;
}
$("lib").addEventListener("click", async (e) => {
  const sync = e.target.closest(".lib-sync");
  if (sync) {
    sync.disabled = true; sync.textContent = "Syncing…";
    try {
      const r = await fetch("/api/download", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ urls: [sync.dataset.url], output: $("outdir").value.trim() }),
      });
      if (r.ok) { const { id } = await r.json(); open.add(id); await refreshJobs(); }
    } finally {
      sync.disabled = false; sync.textContent = "Sync";
    }
    return;
  }
  const btn = e.target.closest(".lib-reveal");
  if (!btn) return;
  await fetch("/api/reveal", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ path: btn.dataset.path }) });
});
$("lib-refresh").onclick = refreshLibrary;

/* ---- crons ---- */
function cronSub(c) {
  if (c.managed) {
    const n = (c.urls || []).length;
    return `${c.friendly} · ${n} link${n === 1 ? "" : "s"}`;
  }
  return `${c.friendly} · ${c.command.split("/").pop()}`;
}
function cronTitle(c) {
  if (c.managed) return c.label ? `→ ${c.label}` : (c.urls || []).map(shortUrl).join(", ");
  return c.command.split(" ").pop().split("/").pop();
}
let cronsById = {};
async function refreshCrons() {
  const list = await (await fetch("/api/crons")).json();
  cronsById = Object.fromEntries(list.map((c) => [c.id, c]));
  $("crons-card").hidden = !list.length;
  $("crons-empty").hidden = !!list.length;
  $("crons").innerHTML = list.map((c) => `
    <div class="cron ${c.enabled ? "" : "dim"} ${c.id === editingCronId ? "editing" : ""}" data-id="${c.id}">
      <label class="switch"><input type="checkbox" ${c.enabled ? "checked" : ""}><span class="slider"></span></label>
      <div class="cron-main" title="${esc(c.command)}">
        <div class="cron-title">${esc(cronTitle(c))}</div>
        <div class="cron-sub">${esc(cronSub(c))}</div>
      </div>
      ${c.managed ? `<button class="cron-edit${c.id === editingCronId ? " on" : ""}">Edit</button><button class="cron-del">Delete</button>` : ""}
    </div>`).join("");
}

/* ---- edit an existing schedule ---- */
let editingCronId = null;

function startEditCron(id) {
  const c = cronsById[id];
  if (!c) return;
  $("links").value = (c.urls || []).join("\n");
  renderPreviews();
  schedulePreviews();
  if (c.output) { $("outdir").value = c.output; localStorage.setItem("outdir", c.output); refreshLibrary(); }
  const f = c.fields || { freq: "daily", hour: 3, minute: 0 };
  $("freq").value = f.freq;
  $("freq").onchange();
  if (f.freq === "weekly" && f.dow != null) $("dow").value = f.dow;
  if (f.freq !== "hourly") {
    $("time").value = `${String(f.hour).padStart(2, "0")}:${String(f.minute).padStart(2, "0")}`;
  }
  if (f.freq === "hourly" && f.every) $("every").value = f.every;
  editingCronId = id;
  $("add-sched").textContent = "Save changes";
  $("sched-hint").innerHTML = 'Editing this schedule. <span id="cancel-edit">Cancel</span>';
  $("sched-hint").classList.remove("bad");
  $("sched-panel").hidden = false;
  $("sched-toggle").classList.add("on");
  refreshCrons();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetEditMode() {
  editingCronId = null;
  $("add-sched").textContent = "Add schedule";
  $("sched-hint").textContent = "Re-downloads the links above on a repeating schedule.";
  $("sched-hint").classList.remove("bad");
  refreshCrons();
}
$("sched-hint").addEventListener("click", (e) => { if (e.target.id === "cancel-edit") resetEditMode(); });
$("crons").addEventListener("change", async (e) => {
  if (!e.target.matches(".switch input")) return;
  const id = e.target.closest(".cron").dataset.id;
  await fetch(`/api/crons/${id}/toggle`, { method: "POST" });
  refreshCrons();
});
$("crons").addEventListener("click", async (e) => {
  const editBtn = e.target.closest(".cron-edit");
  if (editBtn) {
    const id = editBtn.closest(".cron").dataset.id;
    if (id === editingCronId) resetEditMode(); else startEditCron(id);
    return;
  }
  const btn = e.target.closest(".cron-del");
  if (!btn) return;
  if (!btn.classList.contains("armed")) {
    btn.classList.add("armed");
    btn.textContent = "Remove?";
    setTimeout(() => { btn.classList.remove("armed"); btn.textContent = "Delete"; }, 2500);
    return;
  }
  const id = btn.closest(".cron").dataset.id;
  await fetch(`/api/crons/${id}`, { method: "DELETE" });
  refreshCrons();
});

/* ---- theme ---- */
function syncThemeIcon() {
  // Show the icon for the theme you'd switch TO.
  const light = document.documentElement.dataset.theme === "light";
  $("theme").textContent = light ? "☾" : "☀";
  $("theme").title = light ? "Switch to dark" : "Switch to light";
}
$("theme").onclick = () => {
  const next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("theme", next);
  syncThemeIcon();
};
syncThemeIcon();

/* ==== DJ Sets tab ==== */
let djTracks = [];            // last-fetched track records
let djSet = [];               // ordered track ids in the working set
const djTrackCache = {};      // every record ever fetched, immune to browser filters
const CAMELOT_CODES = Array.from({length: 12}, (_, i) => [`${i + 1}A`, `${i + 1}B`]).flat();
$("dj-camelot").innerHTML = '<option value="">Any key</option>' +
  CAMELOT_CODES.map((c) => `<option>${c}</option>`).join("");

// Camelot color: hue around the wheel; A ring dimmer than B.
function camelotColor(code) {
  if (!code) return "var(--panel-2)";
  const n = parseInt(code), ring = code.endsWith("A");
  return `hsl(${(n - 1) * 30} 65% ${ring ? 38 : 52}% / 0.85)`;
}

function switchTab(name) {
  document.querySelectorAll(".tab").forEach((b) => b.classList.toggle("on", b.dataset.tab === name));
  $("tab-dl").hidden = name !== "dl";
  $("tab-dj").hidden = name !== "dj";
  document.body.classList.toggle("dj-mode", name === "dj");
  if (name === "dj") { refreshDJStatus(); refreshDJTracks(); }
}
document.querySelector(".tabs").addEventListener("click", (e) => {
  const b = e.target.closest(".tab");
  if (b) switchTab(b.dataset.tab);
});

async function refreshDJStatus() {
  const out = $("outdir").value.trim();
  let s;
  try {
    const r = await fetch("/api/dj/status?path=" + encodeURIComponent(out));
    if (!r.ok) throw new Error();
    s = await r.json();
  } catch {
    $("dj-banner").innerHTML = `<span class="hint">Couldn't read the rekordbox database.</span>`;
    return;
  }
  const dot = `<span class="dot ${s.running ? "open" : "closed"}"></span>`;
  const state = s.running ? "rekordbox is open" : "rekordbox is closed";
  let hint = "";
  if (s.pending) hint = s.running
    ? `${s.pending} track${s.pending === 1 ? "" : "s"} waiting for analysis — rekordbox analyzes them while open (needs Auto-Analysis on).`
    : `${s.pending} track${s.pending === 1 ? "" : "s"} not analyzed yet — open rekordbox to analyze.`;
  const importBtn = s.not_imported
    ? `<button id="dj-import" ${s.running ? "disabled title='Close rekordbox first'" : ""}>Import ${s.not_imported} new</button>`
    : "";
  $("dj-banner").innerHTML =
    `${dot}<span>${esc(state)}</span><span class="hint">${esc(hint)}</span><span class="spacer"></span>${importBtn}`;
  const btn = $("dj-import");
  if (btn) btn.onclick = async () => {
    btn.disabled = true; btn.textContent = "Importing…";
    try {
      const r = await fetch("/api/dj/import", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path: $("outdir").value.trim() }),
      });
      if (r.ok) {
        const d = await r.json();
        const skipped = d.skipped_duplicates.length;
        btn.textContent = `Imported ${d.imported.length}` + (skipped ? `, ${skipped} dup${skipped === 1 ? "" : "s"} skipped` : "");
        setTimeout(() => { refreshDJStatus(); refreshDJTracks(); }, 1500);
      } else {
        btn.textContent = (await r.json()).detail || "Failed";
      }
    } catch { btn.textContent = "Failed"; }
  };
}

async function refreshDJTracks() {
  const params = new URLSearchParams();
  if ($("dj-q").value.trim()) params.set("q", $("dj-q").value.trim());
  if ($("dj-bpm-min").value) params.set("bpm_min", $("dj-bpm-min").value);
  if ($("dj-bpm-max").value) params.set("bpm_max", $("dj-bpm-max").value);
  if ($("dj-camelot").value) params.set("camelot", $("dj-camelot").value);
  let d;
  try {
    const r = await fetch("/api/dj/tracks?" + params);
    if (!r.ok) throw new Error();
    d = await r.json();
  } catch {
    $("dj-rows").innerHTML = `<tr><td colspan="6" class="dj-pending">Couldn't read the rekordbox database.</td></tr>`;
    return;
  }
  djTracks = d.tracks;
  for (const t of d.tracks) djTrackCache[t.id] = t;
  renderDJRows();
}

function renderDJRows() {
  const inSet = new Set(djSet);
  $("dj-rows").innerHTML = djTracks.map((t) => {
    const key = t.camelot
      ? `<span class="dj-key" style="background:${camelotColor(t.camelot)};color:#fff">${t.camelot}</span>`
      : `<span class="dj-pending">${t.status === "pending" ? "analyzing…" : "—"}</span>`;
    const add = t.status === "analyzed"
      ? `<button class="dj-add" data-id="${t.id}" ${inSet.has(t.id) ? "disabled" : ""}>${inSet.has(t.id) ? "Added" : "+ Set"}</button>`
      : "";
    return `<tr>
      <td>${t.status === "pending" ? "⏳" : ""}</td>
      <td title="${esc(t.title)}">${esc(t.title)}</td>
      <td title="${esc(t.artist)}">${esc(t.artist)}</td>
      <td class="num">${t.bpm ? t.bpm.toFixed(1) : ""}</td>
      <td>${key}</td>
      <td>${add}</td>
    </tr>`;
  }).join("") || `<tr><td colspan="6" class="dj-pending">No tracks match.</td></tr>`;
}

let djFilterTimer = null;
["dj-q", "dj-bpm-min", "dj-bpm-max"].forEach((id) =>
  $(id).addEventListener("input", () => {
    clearTimeout(djFilterTimer);
    djFilterTimer = setTimeout(refreshDJTracks, 300);
  }));
$("dj-camelot").onchange = refreshDJTracks;
$("dj-refresh").onclick = () => { refreshDJStatus(); refreshDJTracks(); };
$("dj-rows").addEventListener("click", (e) => {
  const b = e.target.closest(".dj-add");
  if (b && !b.disabled) addToSet(b.dataset.id);
});
setInterval(() => { if (!$("tab-dj").hidden) refreshDJStatus(); }, 5000);

/* ---- set builder ---- */
function djTrack(id) { return djTrackCache[id] || djTracks.find((t) => t.id === id); }

function addToSet(id) {
  if (!djSet.includes(id)) djSet.push(id);
  renderDJRows();
  renderSet();
}

function removeFromSet(id) {
  djSet = djSet.filter((x) => x !== id);
  renderDJRows();
  renderSet();
}

async function renderSet() {
  const list = $("dj-set-list");
  const tracks = djSet.map(djTrack).filter(Boolean);
  if (!tracks.length) {
    list.innerHTML = `<div class="dj-empty-set">Add analyzed tracks from the browser above, then drag to order.</div>`;
    $("dj-set-summary").innerHTML = "";
    if (typeof renderWheel === "function") renderWheel([]);
    if (typeof renderEnergy === "function") renderEnergy([]);
    return;
  }
  let ratings = [];
  if (tracks.length > 1) {
    try {
      const r = await fetch("/api/dj/compatibility", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids: djSet }),
      });
      if (r.ok) ratings = (await r.json()).ratings;
    } catch { /* markers just don't render */ }
  }
  const bpms = tracks.map((t) => t.bpm).filter(Boolean);
  const keys = [...new Set(tracks.map((t) => t.camelot).filter(Boolean))];
  $("dj-set-summary").textContent =
    `${tracks.length} tracks · ${Math.min(...bpms).toFixed(0)}–${Math.max(...bpms).toFixed(0)} BPM · keys: ${keys.join(" ")}`;
  list.innerHTML = tracks.map((t, i) => {
    const slot = `<div class="dj-slot" draggable="true" data-id="${t.id}">
      <span class="n">${i + 1}</span>
      <span class="dj-key" style="background:${camelotColor(t.camelot)};color:#fff">${t.camelot || "?"}</span>
      <span class="t">${esc(t.title)} <small>· ${esc(t.artist)}</small></span>
      <span class="num">${t.bpm ? t.bpm.toFixed(1) : ""}</span>
      <button class="rm" data-id="${t.id}" title="Remove">×</button>
    </div>`;
    const link = i < tracks.length - 1 && ratings[i]
      ? `<div class="dj-link ${ratings[i]}"><span class="line"></span><span class="why">${ratings[i]}</span></div>`
      : "";
    return slot + link;
  }).join("");
  if (typeof renderWheel === "function") renderWheel(tracks);
  if (typeof renderEnergy === "function") renderEnergy(tracks);
}

/* drag to reorder */
let dragId = null;
$("dj-set-list").addEventListener("dragstart", (e) => {
  const slot = e.target.closest(".dj-slot");
  if (!slot) return;
  dragId = slot.dataset.id;
  slot.classList.add("dragging");
});
$("dj-set-list").addEventListener("dragend", (e) => {
  e.target.closest(".dj-slot")?.classList.remove("dragging");
  dragId = null;
});
$("dj-set-list").addEventListener("dragover", (e) => {
  e.preventDefault();
  const over = e.target.closest(".dj-slot");
  if (!over || !dragId || over.dataset.id === dragId) return;
  const from = djSet.indexOf(dragId);
  const to = djSet.indexOf(over.dataset.id);
  djSet.splice(from, 1);
  djSet.splice(to, 0, dragId);
  renderSet();
});
$("dj-set-list").addEventListener("click", (e) => {
  const rm = e.target.closest(".rm");
  if (rm) removeFromSet(rm.dataset.id);
});

/* save to rekordbox */
$("dj-save").onclick = async () => {
  const name = $("dj-set-name").value.trim();
  const btn = $("dj-save");
  if (!name || !djSet.length) {
    btn.textContent = !name ? "Name the set first" : "Add tracks first";
    setTimeout(() => { btn.textContent = "Save to rekordbox"; }, 2000);
    return;
  }
  btn.disabled = true; btn.textContent = "Saving…";
  try {
    const r = await fetch("/api/dj/export", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, ids: djSet }),
    });
    const d = await r.json();
    btn.textContent = r.ok ? `Saved as “${d.playlist}”` : (d.detail || "Failed");
  } catch {
    btn.textContent = "Failed";
  } finally {
    btn.disabled = false;
    setTimeout(() => { btn.textContent = "Save to rekordbox"; }, 3500);
  }
};
renderSet();   // initial empty state

/* ---- camelot wheel ---- */
function wheelArc(cx, cy, r0, r1, a0, a1) {
  const p = (r, a) => [cx + r * Math.sin(a), cy - r * Math.cos(a)];
  const [x0, y0] = p(r1, a0), [x1, y1] = p(r1, a1);
  const [x2, y2] = p(r0, a1), [x3, y3] = p(r0, a0);
  return `M${x0},${y0} A${r1},${r1} 0 0 1 ${x1},${y1} L${x2},${y2} A${r0},${r0} 0 0 0 ${x3},${y3} Z`;
}

function renderWheel(tracks) {
  const size = 260, cx = size / 2, cy = size / 2;
  const present = new Set(tracks.map((t) => t.camelot).filter(Boolean));
  const counts = {};
  tracks.forEach((t) => { if (t.camelot) counts[t.camelot] = (counts[t.camelot] || 0) + 1; });
  const seg = (2 * Math.PI) / 12;
  let paths = "";
  for (let n = 1; n <= 12; n++) {
    const a0 = (n - 1) * seg - seg / 2, a1 = a0 + seg;
    for (const [ring, r0, r1] of [["A", 52, 88], ["B", 90, 126]]) {
      const code = `${n}${ring}`;
      const on = present.has(code);
      paths += `<path d="${wheelArc(cx, cy, r0, r1, a0, a1)}" data-code="${code}"
        fill="${camelotColor(code)}" opacity="${on ? 1 : 0.16}"
        stroke="var(--panel)" stroke-width="1.5" style="cursor:pointer"/>`;
      const mid = (a0 + a1) / 2, rm = (r0 + r1) / 2;
      const tx = cx + rm * Math.sin(mid), ty = cy - rm * Math.cos(mid);
      paths += `<text x="${tx}" y="${ty + 3.5}" text-anchor="middle" pointer-events="none"
        font-size="10" font-weight="600" fill="${on ? "#fff" : "var(--faint)"}">${code}${counts[code] ? "·" + counts[code] : ""}</text>`;
    }
  }
  // chords between consecutive tracks show each harmonic move
  let chords = "";
  const pos = (code) => {
    const n = parseInt(code), ring = code.endsWith("A");
    const a = (n - 1) * seg, r = ring ? 70 : 108;
    return [cx + r * Math.sin(a), cy - r * Math.cos(a)];
  };
  const seq = tracks.filter((t) => t.camelot);
  for (let i = 0; i < seq.length - 1; i++) {
    if (seq[i].camelot === seq[i + 1].camelot) continue;
    const [x0, y0] = pos(seq[i].camelot), [x1, y1] = pos(seq[i + 1].camelot);
    chords += `<line x1="${x0}" y1="${y0}" x2="${x1}" y2="${y1}"
      stroke="var(--text)" stroke-width="1.4" opacity="0.5" marker-end="url(#dj-arr)"/>`;
  }
  $("dj-wheel").innerHTML = `<svg viewBox="0 0 ${size} ${size}" width="100%">
    <defs><marker id="dj-arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="var(--text)" opacity="0.6"/></marker></defs>
    ${paths}${chords}</svg>`;
}
$("dj-wheel").addEventListener("click", (e) => {
  const code = e.target.closest("path[data-code]")?.dataset.code;
  if (!code) return;
  $("dj-camelot").value = $("dj-camelot").value === code ? "" : code;
  refreshDJTracks();
});

/* ---- boot ---- */
(async () => {
  const cfg = await (await fetch("/api/config")).json();
  DEFAULT_OUT = cfg.default_output;
  PLACES = cfg.places;
  const saved = localStorage.getItem("outdir");
  $("outdir").value = saved !== null ? saved : DEFAULT_OUT;
  $("outdir").placeholder = DEFAULT_OUT;
  renderGoButton();
  refreshJobs();
  refreshLibrary();
  refreshCrons();
  setInterval(refreshJobs, 1500);
  setInterval(refreshCrons, 30000);
})();
</script>
